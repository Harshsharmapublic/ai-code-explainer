<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Explainer Pro</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #2ea043; 
            --text: #c9d1d9; --border: #30363d; --btn-hover: #238636;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 20px;
        }

        .header-container {
            max-width: 1400px; margin: 0 auto 20px auto;
            display: flex; justify-content: space-between; align-items: center;
        }

        h1 { color: #58a6ff; margin: 0; font-size: 1.8rem; }

        .toggle-btn {
            background-color: #1f6feb; color: white; border: none;
            padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }

        .main-container {
            max-width: 1400px; margin: 0 auto;
            display: grid;
            /* Strict 50/50 split. minmax(0, 1fr) prevents the grid from blowing out */
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); 
            gap: 20px;
            transition: all 0.3s ease;
        }

        /* Class to expand output and shrink input */
        .main-container.expanded-output {
            grid-template-columns: minmax(0, 0.5fr) minmax(0, 1.5fr);
        }

        .box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px;
            display: flex; flex-direction: column; height: 80vh;
        }

        textarea {
            flex-grow: 1; background: #010409; color: #7ee787;
            border: 1px solid var(--border); border-radius: 6px; padding: 15px;
            font-family: 'Consolas', monospace; font-size: 14px;
            resize: none; outline: none; margin-bottom: 15px;
        }

        #result {
            flex-grow: 1; overflow-y: auto; background: #010409;
            border: 1px solid var(--border); border-radius: 6px; padding: 20px;
            line-height: 1.6; font-size: 15px;
        }

        .analyze-btn {
            background-color: var(--accent); color: white; border: none;
            padding: 15px; border-radius: 6px; font-weight: bold;
            font-size: 1rem; cursor: pointer;
        }
        .analyze-btn:hover { background-color: var(--btn-hover); }

        /* Clean Markdown Rendering */
        pre { background: #161b22; padding: 15px; border-radius: 6px; border: 1px solid var(--border); overflow-x: auto; }
        code { color: #ff7b72; font-family: 'Consolas', monospace; }
        hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
        ul { margin-top: 0; padding-left: 20px; }
        .loading { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-container">
    <h1>🚀 Pro Code Explainer</h1>
    <button class="toggle-btn" onclick="toggleLayout()">↔️ Toggle Full/Split View</button>
</div>

<div class="main-container" id="layoutGrid">
    <div class="box">
        <h3 style="margin-top:0; color:#58a6ff;">Input Code</h3>
        <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
        <button class="analyze-btn" onclick="analyzeCode()">Analyze with Pro Model</button>
    </div>

    <div class="box">
        <h3 style="margin-top:0; color:#58a6ff;">AI Analysis Report</h3>
        <div id="result">Code paste karein aur analyze par click karein...</div>
    </div>
</div>

<script>
    // ⚠️ APNI API KEY YAHAN DAALEIN
    const API_KEY = "AIzaSyDv1tulUEm842T0dKpER4mUjk91LJ9Q824"; 

    // Layout Toggle Function
    function toggleLayout() {
        const grid = document.getElementById('layoutGrid');
        grid.classList.toggle('expanded-output');
    }

    async function analyzeCode() {
        const codeText = document.getElementById('codeInput').value;
        const resultDiv = document.getElementById('result');

        if (!codeText.trim()) {
            alert("Please paste some code first!");
            return;
        }

        resultDiv.innerHTML = '<p class="loading">⏳ Pro Model is analyzing your code...</p>';

        const prompt = `
            You are an expert Senior Software Engineer. 
            Analyze the following code snippet:
            1. Identify the language.
            2. Explain it line by line.
            3. Point out bugs (if any).
            4. Provide the fully corrected code.

            CODE:
            ${codeText}
        `;

        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                resultDiv.innerHTML = `<p style="color:#f85149"><strong>Error:</strong> ${data.error.message}</p>`;
                return;
            }

            if (data.candidates && data.candidates[0].content) {
                const markdownText = data.candidates[0].content.parts[0].text;
                resultDiv.innerHTML = formatMarkdown(markdownText);
            }

        } catch (err) {
            resultDiv.innerHTML = "<p style='color:#f85149'>Connection failed.</p>";
        }
    }

    // Better formatting for markdown text
    function formatMarkdown(text) {
        return text
            .replace(/^### (.*$)/gim, '<h3 style="color:#2ea043">$1</h3>')
            .replace(/^## (.*$)/gim, '<h2 style="color:#2ea043">$1</h2>')
            .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br>')
            .replace(/---/g, '<hr>');
    }
</script>

</body>
</html>
